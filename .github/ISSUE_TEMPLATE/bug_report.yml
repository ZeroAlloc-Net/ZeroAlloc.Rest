name: Bug Report
description: Something is not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug in ZeroAlloc.Rest.
  - type: input
    id: version
    attributes:
      label: ZeroAlloc.Rest version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Interface definition, usage code, and expected vs actual result.
      render: csharp
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: .NET version, OS, AOT/JIT, serializer used.
    validations:
      required: false
